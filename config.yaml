schedule:
  enabled: false         # true = 啟動常駐排程模式，false = 僅手動執行
  run_time: "08:00"      # 每日執行時間，格式 HH:MM（24 小時制）
  timezone: "Asia/Taipei"

email:
  enabled: true                        # 改為 true 才會啟用寄送，預設 false
  method: smtp                         # 支援 smtp 或 gmail_oauth
  sender_address: user1@example.com
  host: mail.com
  port: 587
  security: starttls                   # smtp 模式支援 ssl / starttls / none
  enable_smtp_auth: false              # 參考現有系統設定，可先測試不做 SMTP AUTH
  login_id: user1              # 若啟用 SMTP AUTH，優先使用 login_id，其次 username
  username: user1@example.com # 舊欄位保留相容
  password: 'password'
  credentials_file: credentials.json  # gmail_oauth 模式使用
  token_file: token.json              # gmail_oauth 模式首次授權後自動產生
  subject_template: "📰 國際財經摘要 {date}"
  recipients:
    - user2@example.com

crawler:
  max_articles_per_site: 10
  request_delay_min: 2   # 每站請求間隔最小秒數
  request_delay_max: 5   # 每站請求間隔最大秒數
  timeout: 30
  retries: 3
